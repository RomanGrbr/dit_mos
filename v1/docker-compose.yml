services:

  # ── Инфраструктура ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fb_members}"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q 'status'"]
      interval: 10s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py create_es_index &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - ES_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      watchmedo auto-restart
      --directory=./members --directory=./scraper --directory=./config
      --pattern='*.py' --recursive --
      celery -A config worker -Q celery,capture --concurrency=1 -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - ES_URL=http://localhost:9200
      - REDIS_URL=redis://localhost:6379/0
      - POSTGRES_HOST=localhost
      - HTTPS_PROXY=http://127.0.0.1:12334
      - HTTP_PROXY=http://127.0.0.1:12334
      - NO_PROXY=localhost,127.0.0.1,31.13.72.36
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      watchmedo auto-restart
      --directory=./members --directory=./scraper --directory=./config
      --pattern='*.py' --recursive --
      celery -A config beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg_data:
  es_data:
